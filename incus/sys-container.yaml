config:
  boot.autostart: "true"
  limits.cpu: "2"
  limits.memory: "2048MiB"
  # for k3s
  security.nesting: "true" # allow nested containers(pods)|docker/containerd
  security.privileged: "true"
  linux.kernel_modules: overlay,nf_conntrack,br_netfilter,ip_tables,ip_vs
devices:
  root:
    path: / # incus instance root
    pool: default # incus profile default
    type: disk
    size: "12GiB"
description: "Incus Ubuntu system containers configuration"
